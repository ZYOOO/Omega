openapi: 3.1.0
info:
  title: Omega Local Server API
  version: 0.1.0
  description: >
    Local Product Layer + Execution Layer API for Omega DevFlow Engine.
servers:
  - url: http://127.0.0.1:3888
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Local server is running
  /workspace:
    get:
      summary: Load current workspace snapshot
      responses:
        '200':
          description: Workspace database returned
        '404':
          description: Workspace not found
    put:
      summary: Persist current workspace snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Workspace saved
  /events:
    get:
      summary: List mission events
      responses:
        '200':
          description: Mission events returned
  /requirements:
    get:
      summary: List first-class requirements
      description: >
        Returns persisted Requirement records. A Requirement is the source need that owns one
        or more Omega Items. GitHub issues and future Feishu messages are represented as
        requirement sources through `source` and `sourceExternalRef`.
      responses:
        '200':
          description: Requirement records returned
  /pipelines:
    get:
      summary: List pipelines
      responses:
        '200':
          description: Pipelines returned
  /attempts:
    get:
      summary: List run attempts
      description: >
        Returns one record for each concrete pipeline execution attempt, including
        status, runner, repository target, workspace path, branch, PR URL, stage
        snapshots, and error summaries.
      responses:
        '200':
          description: Attempt records returned
  /attempts/{id}/timeline:
    get:
      summary: Read an attempt run timeline
      description: >
        Returns a chronological, read-only timeline for one concrete execution attempt.
        The timeline is assembled from persisted Attempt events, Pipeline run events and
        stage snapshots, Checkpoints, Operations, Proof records, and Runtime logs that
        match the attempt or its pipeline.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attempt timeline returned
        '404':
          description: Attempt not found
  /attempts/{id}/retry:
    post:
      summary: Retry a failed, stalled, or canceled attempt
      description: >
        Creates a new concrete DevFlow attempt for the same Work Item and Repository
        Workspace, links it to the previous attempt with retry metadata, resets the
        pipeline stages, and starts a new background run. Previous attempt records are
        preserved for audit and timeline review.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                autoApproveHuman:
                  type: boolean
                autoMerge:
                  type: boolean
                wait:
                  type: boolean
      responses:
        '202':
          description: Retry attempt accepted
        '409':
          description: Attempt status is not retryable or another attempt is active
        '404':
          description: Attempt or pipeline not found
  /attempts/{id}/cancel:
    post:
      summary: Cancel a running attempt
      description: >
        Sends a cancel signal to the registered background attempt job when one is active,
        marks the Attempt as canceled, marks the Pipeline as canceled, moves the Work Item
        to Blocked, and records an attempt.canceled event. If no local job is currently
        registered, the database state still records the operator cancellation.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Canceled attempt returned with cancelSignalSent
        '404':
          description: Attempt not found
  /checkpoints:
    get:
      summary: List checkpoints
      responses:
        '200':
          description: Checkpoints returned
  /missions:
    get:
      summary: List mission records
      responses:
        '200':
          description: Missions returned
  /operations:
    get:
      summary: List operation records
      responses:
        '200':
          description: Operations returned
  /proof-records:
    get:
      summary: List structured proof records
      responses:
        '200':
          description: Proof records returned
  /run-workpads:
    get:
      summary: List Run Workpad records
      description: >
        Returns structured Workpad records bound to concrete Attempts. Each record
        contains Plan, Acceptance Criteria, Validation, Notes, Blockers, PR,
        Review Feedback, and Retry Reason fields. Supports filters for attemptId,
        pipelineId, workItemId, repositoryTargetId, and status.
      parameters:
        - in: query
          name: attemptId
          schema:
            type: string
        - in: query
          name: pipelineId
          schema:
            type: string
        - in: query
          name: workItemId
          schema:
            type: string
        - in: query
          name: repositoryTargetId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Run Workpad records returned
  /runtime-logs:
    get:
      summary: List append-only runtime logs
      description: >
        Returns structured runtime log records from the local SQLite log stream. Supports
        filters for level, eventType, entityType/entityId, projectId, repositoryTargetId,
        workItemId, pipelineId, attemptId, stageId, agentId, requestId, createdAfter,
        createdBefore, and limit.
      parameters:
        - in: query
          name: level
          schema:
            type: string
            enum: [INFO, DEBUG, ERROR]
        - in: query
          name: eventType
          schema:
            type: string
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: entityId
          schema:
            type: string
        - in: query
          name: projectId
          schema:
            type: string
        - in: query
          name: repositoryTargetId
          schema:
            type: string
        - in: query
          name: workItemId
          schema:
            type: string
        - in: query
          name: pipelineId
          schema:
            type: string
        - in: query
          name: attemptId
          schema:
            type: string
        - in: query
          name: stageId
          schema:
            type: string
        - in: query
          name: agentId
          schema:
            type: string
        - in: query
          name: requestId
          schema:
            type: string
        - in: query
          name: createdAfter
          schema:
            type: string
            format: date-time
        - in: query
          name: createdBefore
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Runtime log records returned
  /migrations:
    get:
      summary: List applied local database migrations
      responses:
        '200':
          description: Migration records returned
  /execution-locks:
    get:
      summary: List local execution locks
      description: >
        Returns persisted execution locks used by the local orchestrator to prevent duplicate
        claiming/running of the same repository issue or work item across local App instances.
      responses:
        '200':
          description: Execution locks returned
  /execution-locks/{id}/release:
    post:
      summary: Release a local execution lock
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Released execution lock returned
        '404':
          description: Execution lock not found
  /job-supervisor/tick:
    post:
      summary: Run one local JobSupervisor reconciliation tick
      description: >
        Runs the local JobSupervisor reconciliation and scheduling tick. The tick
        repairs pending human checkpoints that lost their concrete attempt link,
        backfills a recoverable attempt record when needed, checks workflow contract
        metadata, marks stale running attempts as stalled, scans Ready repository-bound
        Work Items through DevFlow preflight, and scans failed/stalled Attempts for
        retry recovery. Repository-writing actions remain explicit: Ready work only
        starts when autoRunReady is true, and failed/stalled Attempts only retry when
        autoRetryFailed is true.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                staleAfterSeconds:
                  type: integer
                  description: Attempt heartbeat age threshold before a running attempt is marked stalled. Defaults to 900 seconds.
                autoRunReady:
                  type: boolean
                  description: When true, runnable Ready Work Items that pass preflight are started as new Attempts.
                autoRetryFailed:
                  type: boolean
                  description: When true, failed or stalled Attempts that pass retry policy are retried as new Attempts.
                autoCleanupWorkspaces:
                  type: boolean
                  description: 为 true 时，满足清理策略的 completed Attempt 会删除 repo checkout，并保留 proof。
                maxRetryAttempts:
                  type: integer
                  description: Maximum automatic retries per retry root. Defaults to 2.
                retryBackoffSeconds:
                  type: integer
                  description: Minimum age before a failed or stalled Attempt can be retried.
                workspaceRetentionSeconds:
                  type: integer
                  description: completed workspace 成为 cleanup candidate 前需要等待的秒数；默认读取 workflow runtime。
                limit:
                  type: integer
                  description: Maximum Ready Work Items and recoverable Attempts to inspect in this tick. Defaults to 10.
      responses:
        '200':
          description: Supervisor tick summary returned
  /workspaces/cleanup:
    post:
      summary: 规划或执行 workspace cleanup
      description: >
        扫描带 workspacePath 的 terminal Attempt。默认只返回 dry-run 计划。
        当 apply 为 true 时，满足 retention policy 的 completed Attempt 会删除 repo checkout，
        同时保留 .omega proof 和 lifecycle artifacts。failed / canceled / stalled Attempt
        默认保留，方便后续排障。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                apply:
                  type: boolean
                retentionSeconds:
                  type: integer
                limit:
                  type: integer
      responses:
        '200':
          description: 返回 workspace cleanup summary
  /pipeline-templates:
    get:
      summary: List pipeline templates
      description: Returns templates compiled from the default workflow markdown plus built-in compatibility templates.
      responses:
        '200':
          description: Pipeline templates returned
  /workflow-templates:
    get:
      summary: List workflow templates
      description: Returns workflow-backed templates, including source path, markdown body, stage definitions, review rounds, and prompt template.
      responses:
        '200':
          description: Workflow templates returned
  /pipelines/from-template:
    post:
      summary: Create a pipeline from a work item and template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Pipeline returned
  /llm-providers:
    get:
      summary: List configurable LLM providers
      responses:
        '200':
          description: Provider list returned
  /llm-provider-selection:
    get:
      summary: Read current runtime LLM provider selection
      responses:
        '200':
          description: Provider selection returned
    put:
      summary: Update runtime LLM provider selection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Provider selection persisted
  /agent-definitions:
    get:
      summary: List stage agent definitions and IO contracts
      responses:
        '200':
          description: Agent definitions returned
  /agent-profile:
    get:
      summary: Read resolved Project Agent Profile
      description: Returns the repository override when `repositoryTargetId` is provided, otherwise the project profile or default profile.
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
        - in: query
          name: repositoryTargetId
          schema:
            type: string
      responses:
        '200':
          description: Agent profile returned
    put:
      summary: Save Project or Repository Agent Profile
      description: Persists workflow markdown, per-Agent runner/model/tool config, and runtime file policy into the first-class local SQLite agent_profiles table, with a compatibility mirror in local settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Agent profile persisted
  /local-capabilities:
    get:
      summary: Inspect locally available execution tools
      description: Reports whether local commands such as codex, opencode, claude, git, gh, and lark-cli are installed and runnable.
      responses:
        '200':
          description: Local capability list returned
  /local-workspace-root:
    get:
      summary: Read the local runner workspace root
      description: Returns the directory where Omega creates isolated operation workspaces.
      responses:
        '200':
          description: Local workspace root returned
    put:
      summary: Update the local runner workspace root
      description: Persists the directory where Omega creates isolated operation workspaces. `~` is expanded on the local machine.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspaceRoot
              properties:
                workspaceRoot:
                  type: string
                  example: ~/Omega/workspaces
      responses:
        '200':
          description: Local workspace root updated
        '400':
          description: Invalid workspace root
  /page-pilot/apply:
    post:
      summary: Apply an in-page Page Pilot instruction to real source
      description: Receives selection context from the Page Pilot overlay, resolves the locked repository target, runs the single Page Pilot Agent page-editing stage, writes a real source patch, and returns changed files plus diff summaries. On success the runtime also materializes a `source=page_pilot` Requirement, Work Item, and lightweight `page-pilot` pipeline run linked back to the Page Pilot run. The runtime rejects requests that cannot resolve a local worktree suitable for HMR or dev server reload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryTargetId
                - instruction
                - selection
              properties:
                projectId:
                  type: string
                repositoryTargetId:
                  type: string
                instruction:
                  type: string
                runner:
                  type: string
                  example: profile
                selection:
                  type: object
      responses:
        '200':
          description: Source patch applied; diff summary and feature-one linkage (`requirementId`, `workItemId`, `pipelineId`, `pipelineRunId`) returned
        '400':
          description: Missing repository target, invalid source mapping, unavailable runner, or no source diff
  /page-pilot/deliver:
    post:
      summary: Deliver a confirmed Page Pilot change
      description: Creates or switches to a Page Pilot branch, commits the current source diff, and creates a GitHub PR when the repository target is GitHub-backed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repositoryTargetId
                - selection
              properties:
                projectId:
                  type: string
                repositoryTargetId:
                  type: string
                instruction:
                  type: string
                branchName:
                  type: string
                draft:
                  type: boolean
                selection:
                  type: object
      responses:
        '200':
          description: Branch, commit, and optional PR information returned
        '400':
          description: No pending diff or repository delivery failed
  /page-pilot/runs:
    get:
      summary: List Page Pilot run records
      description: Returns persisted Page Pilot apply / discard / delivery records from the local runtime SQLite `page_pilot_runs` table.
      responses:
        '200':
          description: Page Pilot runs returned
  /page-pilot/runs/{id}/discard:
    post:
      summary: Discard an unapplied Page Pilot source patch
      description: Reverts changed files for a Page Pilot run that is still in `applied` status, then updates the persisted run record to `discarded`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Page Pilot changes discarded
        '400':
          description: Run is missing, already delivered, or cannot be reverted
  /observability:
    get:
      summary: Return runtime observability summary and dashboard data
      description: >
        Preserves the original counts/status/attention summary and adds dashboard data
        for attempt success rate, failure reasons, slow stages, active runs, pending
        human review queue, and recommended operator actions.
      responses:
        '200':
          description: Observability summary and dashboard data returned
  /work-items:
    post:
      summary: Create an executable item from a requirement source
      description: >
        Creates an Omega Item and ensures it is linked to a Requirement through `requirementId`.
        Manual App intake creates `source = manual`; imported GitHub issues create
        `source = github_issue` requirements before the item is persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Workspace snapshot after creation
  /work-items/{itemId}:
    delete:
      summary: Delete a not-started work item
      description: >
        Deletes only not-started work items that have no pipeline, attempt, checkpoint,
        mission, operation, or proof history. Also removes an unshared Requirement record.
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workspace snapshot after delete
        '409':
          description: Work item has already started or has execution history
    patch:
      summary: Patch a work item status or priority
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Workspace snapshot after patch
  /requirements/decompose:
    post:
      summary: Decompose a raw requirement into structured artifacts and suggested stage work
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                repositoryTarget:
                  type: string
                source:
                  type: string
      responses:
        '200':
          description: Structured requirement artifact returned
        '400':
          description: Missing requirement title or description
  /orchestrator/tick:
    post:
      summary: Claim the next eligible GitHub issue for Omega execution
      description: >
        Reads open issues from a bound repository target, skips issues already imported into Omega,
        skips issues that do not carry an execution-ready label (`omega-ready`, `devflow-ready`,
        `agent-ready`, or `omega-run`), creates or links a `source = github_issue` Requirement,
        creates a repository-scoped Item for that Requirement, and creates a `devflow-pr`
        Pipeline for that item. The `devflow-pr` stages and review rounds come from the default
        workflow markdown when present.
        When `autoRun` is true, the tick also runs the DevFlow cycle with the same repository and
        workspace safety checks as the manual pipeline run endpoint. Background scheduling still
        requires runner supervisor handoff and retry policy before it should be enabled by default.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                repositoryTargetId:
                  type: string
                limit:
                  type: string
                  default: "20"
                autoRun:
                  type: boolean
                  default: false
                autoApproveHuman:
                  type: boolean
                  default: false
                autoMerge:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Claimed work item and pipeline, or idle status when no eligible issue exists
        '400':
          description: Repository target is missing or invalid
  /missions/from-work-item:
    post:
      summary: Build a mission from a work item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Mission returned
  /operations/run:
    post:
      summary: Run an operation and persist resulting events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mission
                - operationId
              properties:
                mission:
                  type: object
                operationId:
                  type: string
                runner:
                  type: string
                  enum:
                    - local-proof
                    - demo-code
                    - codex
      responses:
        '200':
          description: Runner result returned
  /run-operation:
    post:
      summary: Compatibility runner endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mission
                - operationId
              properties:
                mission:
                  type: object
                operationId:
                  type: string
                runner:
                  type: string
                  enum:
                    - local-proof
                    - demo-code
                    - codex
      responses:
        '200':
          description: Runner result returned
  /pipelines/from-work-item:
    post:
      summary: Create a pipeline from a work item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Pipeline returned
  /pipelines/{pipelineId}/start:
    post:
      summary: Start pipeline execution
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline updated
  /pipelines/{pipelineId}/pause:
    post:
      summary: Pause pipeline execution
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline updated
  /pipelines/{pipelineId}/resume:
    post:
      summary: Resume pipeline execution
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline updated
  /pipelines/{pipelineId}/terminate:
    post:
      summary: Terminate pipeline execution
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline updated
  /pipelines/{pipelineId}/complete-stage:
    post:
      summary: Complete the current running stage
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline updated
  /pipelines/{pipelineId}/run-current-stage:
    post:
      summary: Run the current pipeline stage with a local runner
      description: Starts the current ready/running stage if needed, runs the stage operation locally, persists mission, operation, proof records, and advances the pipeline to the next stage or human checkpoint.
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                runner:
                  type: string
                  enum:
                    - local-proof
                    - demo-code
                    - codex
      responses:
        '200':
          description: Pipeline and operation result returned
        '409':
          description: Pipeline has no runnable stage
  /pipelines/{pipelineId}/run-devflow-cycle:
    post:
      summary: Run a Omega DevFlow PR delivery cycle
      description: >
        Starts the default `devflow-pr` workflow template for the pipeline's repository-scoped work item.
        By default this endpoint creates an attempt, returns 202 Accepted immediately, and continues
        execution in a background job. The background job clones the bound repository target into
        the configured local workspace root, creates a branch, commits changes, pushes, creates a
        GitHub pull request, runs review agents, records proof files, and stops at a human
        checkpoint. Merge/delivery only continues after the checkpoint is explicitly approved.
      parameters:
        - in: path
          name: pipelineId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                autoApproveHuman:
                  type: boolean
                  default: false
                  description: Reserved compatibility flag. The product path does not auto-approve human checkpoints.
                autoMerge:
                  type: boolean
                  default: false
                  description: Reserved compatibility flag. Merge requires an approved human checkpoint.
                wait:
                  type: boolean
                  default: false
                  description: Synchronous compatibility mode for tests or scripts. The product UI should leave this false.
      responses:
        '202':
          description: Attempt accepted and background job started
        '200':
          description: DevFlow cycle result, proof files, and updated pipeline returned when wait is true
        '400':
          description: Work item is not bound to a repository target
        '409':
          description: Pipeline is not using the devflow-pr template
  /checkpoints/{checkpointId}/approve:
    post:
      summary: Approve checkpoint
      parameters:
        - in: path
          name: checkpointId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkpoint updated
  /checkpoints/{checkpointId}/request-changes:
    post:
      summary: Reject checkpoint and request changes
      parameters:
        - in: path
          name: checkpointId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkpoint updated
  /github/status:
    get:
      summary: Inspect local gh and GitHub OAuth authentication status
      responses:
        '200':
          description: GitHub CLI status
  /github/oauth/config:
    get:
      summary: Read the product-configured GitHub OAuth app settings without exposing the client secret
      responses:
        '200':
          description: Sanitized OAuth configuration returned
    put:
      summary: Persist GitHub OAuth app settings from the App into local SQLite settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - redirectUri
              properties:
                clientId:
                  type: string
                clientSecret:
                  type: string
                  description: Optional when a secret is already saved
                redirectUri:
                  type: string
                tokenUrl:
                  type: string
      responses:
        '200':
          description: Sanitized OAuth configuration returned
  /github/oauth/start:
    post:
      summary: Create a GitHub OAuth authorization URL through the local service
      responses:
        '200':
          description: Authorization URL, redirect URI, scopes, and state
  /github/cli-login/start:
    post:
      summary: Start local GitHub CLI browser sign-in as the no-OAuth-app fallback
      responses:
        '200':
          description: Started flag, GitHub device verification URL, command hint, and user-facing sign-in message
  /auth/github/callback:
    get:
      summary: Handle GitHub OAuth callback, store token locally, and mark the GitHub connection as connected
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GitHub connection result
  /github/repositories:
    get:
      summary: List repositories visible to the locally authenticated GitHub CLI user
      responses:
        '200':
          description: Repository list returned from gh repo list
  /github/repo-info:
    post:
      summary: Read GitHub repository metadata through gh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Repository info returned
  /github/bind-repository-target:
    post:
      summary: Bind a GitHub repository as a repository target on the current Omega project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                nameWithOwner:
                  type: string
                defaultBranch:
                  type: string
                url:
                  type: string
      responses:
        '200':
          description: Workspace updated with the repository target
  /github/repository-targets/{id}:
    delete:
      summary: Delete a repository workspace and its linked Omega work items from the local app database
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workspace updated after removing the repository target and linked local records
        '404':
          description: Repository target not found
  /github/import-issues:
    post:
      summary: Import GitHub issues into Omega work items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Workspace updated with imported issues
  /github/create-pr:
    post:
      summary: Create a GitHub pull request from runner branch, commit, and proof summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - branchName
              properties:
                workspacePath:
                  type: string
                  description: Omega operation workspace; defaults repositoryPath to workspacePath/repo and reads .omega/proof/change-summary.md
                repositoryPath:
                  type: string
                  description: Local git repository path where gh pr create should run
                repositoryOwner:
                  type: string
                repositoryName:
                  type: string
                title:
                  type: string
                body:
                  type: string
                branchName:
                  type: string
                baseBranch:
                  type: string
                  default: main
                draft:
                  type: boolean
                changedFiles:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Pull request creation result
        '502':
          description: gh pr create failed
  /github/pr-status:
    post:
      summary: Read GitHub pull request review state and checks through gh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repositoryOwner:
                  type: string
                repositoryName:
                  type: string
                repositoryPath:
                  type: string
                workspacePath:
                  type: string
                requiredChecks:
                  type: array
                  items:
                    type: string
                number:
                  type: integer
                url:
                  type: string
      responses:
        '200':
          description: Pull request status, checks, check summary, branch sync, delivery gate, recommended actions, and proof records
        '502':
          description: gh pr view or gh pr checks failed
  /feishu/notify:
    post:
      summary: Send a Feishu text notification through local lark-cli
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chatId
                - text
              properties:
                chatId:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: Notification sent
        '503':
          description: lark-cli missing or failed
